<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#952222">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>alifdiaz | portofolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ==================== LOADING SCREEN ==================== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        
        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(233,69,96,0.2);
            border-top: 3px solid #e94560;
            border-right: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 15px rgba(233,69,96,0.3);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* MODAL WELCOME STYLE */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }
        .welcome-card {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            border-radius: 28px;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 1px solid rgba(233,69,96,0.4);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(233,69,96,0.1);
            animation: slideUp 0.5s ease;
            position: relative;
            font-family: 'Poppins', 'Space Grotesk', sans-serif;
        }
        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .close-modal-btn:hover {
            background: #e94560;
            color: white;
        }
        
        /* TEKS WELCOME TO - di ATAS foto */
        .welcome-text-glitch {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            background: linear-gradient(90deg, 
                #fff, #e94560, #ff6b8a, #e94560, #fff, #ff3366, #e94560);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textGlow 2s linear infinite;
        }
        
        @keyframes textGlow {
            0% {
                background-position: 0% center;
                text-shadow: 0 0 0px rgba(233,69,96,0);
            }
            50% {
                background-position: 100% center;
                text-shadow: 0 0 15px rgba(233,69,96,0.8), 0 0 5px rgba(255,107,138,0.5);
            }
            100% {
                background-position: 200% center;
                text-shadow: 0 0 0px rgba(233,69,96,0);
            }
        }
        
        /* FOTO PROFIL BULAT DI TENGAH */
        .welcome-profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e94560;
            box-shadow: 0 0 20px rgba(233,69,96,0.3);
            margin: 0 auto 1rem;
            display: block;
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 5px 0;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .welcome-title span {
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .welcome-info {
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 12px 18px;
            margin: 20px 0;
            text-align: left;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 13px;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: 600;
            color: #e94560;
            letter-spacing: 0.5px;
            font-size: 11px;
        }
        .info-value {
            font-weight: 500;
            color: #ddd;
            font-size: 12px;
            font-family: monospace;
        }
        .welcome-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 15px;
        }
        
        /* ==================== BUTTON DENGAN GARIS TEBAL MIRING BERKILAT ==================== */
        .welcome-btn {
            flex: 1;
            padding: 12px 0;
            border: 1.5px solid #e94560;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', monospace;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            transition: color 0.3s ease, transform 0.2s ease;
            z-index: 1;
            background: transparent;
        }
        
        /* Garis tebal miring berkilat di dalam button */
        .welcome-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(115deg, 
                transparent 0%, 
                transparent 35%,
                rgba(233,69,96,0.8) 45%,
                rgba(255,107,138,0.9) 50%,
                rgba(233,69,96,0.8) 55%,
                transparent 65%,
                transparent 100%);
            transform: rotate(25deg) translateX(-100%);
            animation: shinyLine 2.5s infinite ease-in-out;
            z-index: -1;
        }
        
        @keyframes shinyLine {
            0% {
                transform: rotate(25deg) translateX(-100%);
            }
            20% {
                transform: rotate(25deg) translateX(100%);
            }
            100% {
                transform: rotate(25deg) translateX(100%);
            }
        }
        
        /* Warna solid untuk hover (efek dari samping) */
        .welcome-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8B0000, #e94560);
            transition: left 0.3s ease;
            z-index: -2;
        }
        
        .welcome-btn:hover::after {
            left: 0;
        }
        
        .welcome-btn:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233,69,96,0.4);
        }
        
        .welcome-btn:hover::before {
            animation: shinyLineFast 0.8s infinite;
        }
        
        @keyframes shinyLineFast {
            0% {
                transform: rotate(25deg) translateX(-100%);
            }
            100% {
                transform: rotate(25deg) translateX(100%);
            }
        }
        
        .contact-btn, .start-btn {
            background: transparent;
            color: #e94560;
        }
        
        .welcome-btn:active {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(233,69,96,0.3);
        }
        
        .welcome-footer {
            font-size: 10px;
            color: #555;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Style untuk tombol portofolio */
        .social-link {
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: color 0.3s ease;
        }
        
        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .social-link:hover::before {
            left: 0;
        }
        
        .social-link:hover {
            color: white !important;
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- VIDEO BACKGROUND LOOP -->
    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="video/background.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- AUDIO UNTUK SOUND KLIK (tersembunyi) -->
    <audio id="clickSound" preload="auto">
        <source src="audio/click.mp3" type="audio/mpeg">
    </audio>

    <!-- MAIN CONTENT -->
    <main class="content">
        <div class="profile-img-wrapper">
            <img src="images/profile-photo.jpg" alt="ALIF DIAZ" class="profile-img">
        </div>
        <h1 class="title">ALIF DIAZ</h1>
        <p class="description">programmer modal ai / pemula</p>
        <div class="social-links">
            <a href="https://web-kelas-by-lifx.vercel.app/" target="_blank" rel="noopener noreferrer" class="social-link">Project 2</a>
            <a href="https://wa.me/6282319663436" target="_blank" rel="noopener noreferrer" class="social-link">WhatsApp</a>
            <a href="https://liftupload-github-gitlab-5ja0.arcada.app/" target="_blank" rel="noopener noreferrer" class="social-link">Upload Via Website</a>
            <a href="https://webzip-scraper-11j1.arcada.app/" target="_blank" rel="noopener noreferrer" class="social-link">Scraper Website</a>
            <a href="https://lifx-the-prompt-byalif.base44.app" target="_blank" rel="noopener noreferrer" class="social-link">Jailbreak Website</a>
            <a href="https://alifdiaz257-arch.github.io/Qr/" target="_blank" rel="noopener noreferrer" class="social-link">qr scanner</a>
        </div>
    </main>

    <script>
        // ==================== FUNGSI PLAY SOUND KLIK ====================
        function playClickSound() {
            const clickSound = document.getElementById('clickSound');
            if (clickSound) {
                clickSound.currentTime = 0; // Reset ke awal
                clickSound.play().catch(e => console.log('Sound klik tidak bisa diputar:', e));
            }
        }

        // ==================== LOADING SCREEN FADE KE WELCOME MODAL ====================
        window.addEventListener('DOMContentLoaded', () => {
            const fontLink = document.createElement('link');
            fontLink.href = 'https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap';
            fontLink.rel = 'stylesheet';
            document.head.appendChild(fontLink);

            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hide');
                
                setTimeout(() => {
                    const modal = document.createElement('div');
                    modal.className = 'welcome-modal';
                    modal.innerHTML = `
                        <div class="welcome-card">
                            <button class="close-modal-btn" id="closeModalBtn">✕</button>
                            <div class="welcome-text-glitch" data-text="WELCOME TO">WELCOME TO</div>
                            <img src="images/profile-photo.jpg" alt="ALIF DIAZ" class="welcome-profile-img">
                            <h2 class="welcome-title">PORT<span>FOLIO</span></h2>
                            
                            <div class="welcome-info">
                                <div class="info-item">
                                    <span class="info-label">⚡ NAME</span>
                                    <span class="info-value">ALIF DIAZ</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">🎭 ROLE</span>
                                    <span class="info-value">PEMULA</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">🤖 info</span>
                                    <span class="info-value">Portofolio Project Saya</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">📅 STATUS</span>
                                    <span class="info-value">ACTIVE</span>
                                </div>
                            </div>

                            <div class="welcome-buttons">
                                <button class="welcome-btn contact-btn" id="contactBtn">
                                    HUBUNGI SAYA
                                </button>
                                <button class="welcome-btn start-btn" id="startBtn">
                                    STARTED
                                </button>
                            </div>
                            
                            <p class="welcome-footer">©2025 / 2026 portolio project by alifdiaz</p>
                        </div>
                    `;
                    document.body.appendChild(modal);

                    // Event listeners dengan sound klik
                    const closeBtn = document.getElementById('closeModalBtn');
                    const contactBtn = document.getElementById('contactBtn');
                    const startBtn = document.getElementById('startBtn');

                    closeBtn.addEventListener('click', () => {
                        playClickSound();
                        modal.style.animation = 'fadeOut 0.3s ease';
                        setTimeout(() => modal.remove(), 300);
                    });

                    contactBtn.addEventListener('click', () => {
                        playClickSound();
                        window.open('https://wa.me/6282319663436', '_blank');
                    });

                    startBtn.addEventListener('click', () => {
                        playClickSound();
                        modal.style.animation = 'fadeOut 0.3s ease';
                        setTimeout(() => modal.remove(), 300);
                    });
                }, 200);
            }, 2000);
        });

        // ==================== SOUND KLIK UNTUK SEMUA SOCIAL LINK ====================
        document.addEventListener('click', (e) => {
            // Cek apakah yang diklik adalah social link
            if (e.target.classList && e.target.classList.contains('social-link')) {
                playClickSound();
            }
        });
    </script>
    
    <style>
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
        }
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .profile-img-wrapper {
            margin-bottom: 1.5rem;
        }
        .profile-img {
            width: 142px;
            height: 142px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e94560;
            box-shadow: 0 0 20px rgba(233,69,96,0.3);
        }
        .title {
            font-family: 'Poppins', monospace;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .description {
            color: #ccc;
            font-family: monospace;
            margin-bottom: 2rem;
        }
        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .social-link {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1.5px solid #e94560;
            border-radius: 40px;
            color: #e94560;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
            cursor: pointer;
        }
    </style>
</body>
</html>
